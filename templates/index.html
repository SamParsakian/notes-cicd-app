<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>notes-cicd-app</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">
    <main class="card card--main">
      <header class="hero">
        <h1 class="hero__title">notes-cicd-app</h1>
        <p class="hero__subtitle">Capture quick ideas. Notes stay in memory until you restart the server.</p>
      </header>

      <section class="section" aria-labelledby="add-heading">
        <h2 id="add-heading" class="section__title">Add a note</h2>
        <form class="note-form" method="post" action="{{ url_for('main.index') }}">
          <label class="sr-only" for="note-body">Note text</label>
          <textarea
            id="note-body"
            name="note"
            class="note-form__textarea"
            rows="4"
            placeholder="Write something short…"
            required
          ></textarea>
          <button type="submit" class="btn btn--primary">Add note</button>
        </form>
      </section>

      <section class="section" aria-labelledby="recent-heading">
        <h2 id="recent-heading" class="section__title">Recent notes</h2>
        {% if notes %}
        <ul class="note-list">
          {% for note in notes %}
          <li class="note-card">
            <p class="note-card__text">{{ note }}</p>
          </li>
          {% endfor %}
        </ul>
        {% else %}
        <p class="section__hint">No notes yet. Add one above.</p>
        {% endif %}
      </section>
    </main>

    <footer class="footer">
      <p>notes-cicd-app — a small Flask starter</p>
    </footer>
  </div>
</body>
</html>
